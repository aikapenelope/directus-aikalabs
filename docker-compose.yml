services:
  # Directus — headless CMS + REST/GraphQL API + MCP server + admin UI
  # Docs: https://docs.directus.io/self-hosted/docker-guide.html
  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    environment:
      SECRET: ${SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      WEBSOCKETS_ENABLED: "true"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3001,http://localhost:7777,http://localhost:8055"
      PUBLIC_URL: "http://localhost:8055"
    depends_on:
      postgres:
        condition: service_healthy

  # PostgreSQL 16 — the source of truth for all data
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  directus-uploads:
  directus-extensions:
  postgres-data:
